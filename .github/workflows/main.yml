name: Spring Boot CI/CD Deploy

# 設定在 push 到 main 分支時觸發此工作流程
on:
  push:
    branches:
      - main
  # 也可以手動觸發 (選用)
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: ⬇ Checkout 程式碼1
      uses: actions/checkout@v4

    - name: 🛠️ 設定 Java 環境 (請替換為您的 JDK 版本)
      uses: actions/setup-java@v4
      with:
        java-version: '17' # 或 '21' 適用於 Spring Boot 3
        distribution: 'temurin'
        cache: 'maven'

    - name: 填充佔位符
      shell: bash
      env:
        DB_USER: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
        DB_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
        MAIL_USERNAME: ${{ secrets.SPRING_MAIL_USERNAME }}
        MAIL_PASSWORD: ${{ secrets.SPRING_MAIL_PASSWORD }}
        MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
        MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        MINIO_BUCKET_NAME: ${{ secrets.MINIO_BUCKET_NAME }}
        MERCHANT_ID: ${{ secrets.MERCHANT_ID }}
        MERCHANT_KEY: ${{ secrets.MERCHANT_KEY }}

      run: |
        envsubst < ticbcs2026-admin/src/main/resources/application-prod.yml > ticbcs2026-admin/src/main/resources/application-prod.yml.tmp 
        mv ticbcs2026-admin/src/main/resources/application-prod.yml.tmp ticbcs2026-admin/src/main/resources/application-prod.yml
        
        envsubst < ticbcs2026-admin/src/main/resources/payment_conf.xml > ticbcs2026-admin/src/main/resources/payment_conf.xml.tmp
        mv ticbcs2026-admin/src/main/resources/payment_conf.xml.tmp ticbcs2026-admin/src/main/resources/payment_conf.xml


    - name:  使用 Maven 打包專案 (生成 JAR 檔)
      run: mvn clean package -DskipTests

    - name: 確認 target
      run: jar tf ticbcs2026-admin/target/ticbcs2026-admin-0.0.1-SNAPSHOT.jar | grep application-prod
      
    - name:  檢查 JAR 檔案是否存在
      run: |
        # 設定您預期的 JAR 檔名模式 (通常是 target/*.jar)
        JAR_PATTERN="ticbcs2026-admin-0.0.1-SNAPSHOT*.jar"
        
        # 檢查 target/ 目錄下是否有符合模式的 JAR 檔
        if [ -f target/${JAR_PATTERN} ]; then
          echo "JAR 檔案已成功生成並存在於 target/ 目錄。"
          ls -l target/ | grep "${JAR_PATTERN}"
        else
          echo "錯誤：找不到 JAR 檔案 target/${JAR_PATTERN}。"
          # 使用 exit 1 強制工作流程失敗，避免執行後續的部署步驟
          exit 1 
        fi
    - name: 上傳 JAR 到 Server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.GCP_VM_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "target/ticbcs2026-admin-0.0.1-SNAPSHOT.jar"
        target: "/home/user/back-end"

    
    - name: 部屬至 server
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.GCP_VM_HOST }}
        port: 22
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          set -e

          BASE="/home/user/back-end"
          SRC="$BASE/target/ticbcs2026-admin-0.0.1-SNAPSHOT.jar"
          NEW="$BASE/ticbcs2026-admin-0.0.1-SNAPSHOT.jar.new"
          APP="$BASE/ticbcs2026-admin-0.0.1-SNAPSHOT.jar"
          LOG="$BASE/output.log"
          BAK="$BASE/ticbcs2026-admin-0.0.1-SNAPSHOT.jar.bak"
          ls -lh "$SRC"
          mv "$SRC" "$NEW"

               # 只抓指定 JAR 的 PID
          PIDS=$(ps aux | grep '[j]ava' | grep -v grep | grep "ticbcs2026-admin-0.0.1-SNAPSHOT.jar" | awk '{print $2}')
          
          if [ -z "$PIDS" ]; then
              echo "目前沒有找到正在執行的 app.jar"
          else
              echo "目前執行中的 PID： $PIDS"
              echo "停止舊程式..."
              kill -15 "$PIDS"
              sleep 5
          fi
          
          echo " 檢查檔案是否存在"
          if [ ! -f "$NEW" ]; then
            echo " 找不到 $NEW"
            exit 1
          fi
          
          echo "檔案資訊"
          ls -lh "$NEW"
          ls -lg "$APP"

          echo "檔案大小（bytes）"
          stat -c "%s" "$NEW"
          stat -c "%s" "$APP"

          echo "SHA256 checksum"
          sha256sum "$NEW"

          echo "備份舊版本"
          [ -f "$APP" ] && mv "$APP" "$BAK"

          echo "啟用新版本"
          mv "$NEW" "$APP"

          sha256sum /home/user/back-end/ticbcs2026-admin-0.0.1-SNAPSHOT.jar
          sha256sum /home/user/back-end/ticbcs2026-admin-0.0.1-SNAPSHOT.jar.bak


          echo "新 JAR 已成功上傳（尚未影響任何服務）"
          nohup java -jar -Dspring.profiles.active=prod  "$APP" > "$LOG" 2>&1 &


    
