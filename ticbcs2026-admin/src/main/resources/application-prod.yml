#使用knife4j強化的API文檔介面,只要訪問ip:port/doc.html即可
knife4j:
  enable: false
  setting:
    language: zh_cn


# 自定義，minio 分布式文件儲存服務,因為沒有實現的starter所以這邊配置主要是獲取屬性值而已
minio:
  #minio服務所在地址,這個指的是server不是控制台
  endpoint: http://localhost:9000
  #預設儲存桶名稱,這是為了避免上傳時沒選定Bucket造成錯誤
  bucketName: ${MINIO_BUCKET_NAME}
  #訪問的key,預設是帳號,除非有去特別設置Access key
  accessKey: ${MINIO_ACCESS_KEY}
  #訪問的密鑰,預設是密碼,除非有去特別設置Access key
  secretKey: ${MINIO_SECRET_KEY}



# 自定義，專案相關
project:
  # 專案域名
  domain: https://ticbcs.org.tw
  # 活動名稱
  name: TICBCS 2026
  # 活動名稱縮寫/別名
  alias: ticbcs2026
  # 語言，可選值zh_TW / en ，用於選擇中文信zh_TW 或 英文信en
  language: zh_TW
  # Banner 圖片
  banner-url: https://ticbcs.org.tw/_nuxt/banner.CL2lyu9P.png
  # 群組相關，與一次寄送 email 數量有關
  group-size: 200
  # 報名模式，可選值: FREE / PREPAID / POSTPAID ，POSTPAID尚未實現
  mode: PREPAID

  # email 相關
  email:
    # 寄件人信箱 (自定義domain 需搭配 spring.mail.* 使用 + brevo STMP ,才有效果)
    # Gmail的話可以直接填進from , 讓寄信和收信的信箱相同
    from: notify@ticbcs.org.tw
    # 寄件人顯示名稱
    from-name: TICBCS 2026 Notification
    # 回覆信箱
    reply-to: twbc.prevention@gmail.com
    # 付款相關
  payment:
    # 付款後客戶返回的頁面
    client-back-url: https://ticbcs.org.tw/member
    # 付款後，金流系統返回結果的頁面，prod-api 為生產環境的判斷詞墜
