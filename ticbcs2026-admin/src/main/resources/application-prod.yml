
server:
  tomcat:
    # TCP 連線建立後，等待 request header 的時間上限
    connection-timeout: 60000
    # 同一 TCP 連線最多可處理多少個 HTTP request,-1為不限制
    #    max-keep-alive-requests: -1
    threads:
      max: 500         # 最大工作執行緒
      min-spare: 50    # 保留閒置執行緒
    accept-count: 300  # 排隊連線數
spring:
  servlet:
    multipart:
      # 單個檔案最大接受3GB，整份Post請求最大接受3GB，記得搭配Nginx去限制檔案大小
      max-file-size: 3GB
      max-request-size: 3GB
  mvc:
    async:
      # 設置為30分鐘，這邊1800000是毫秒，此為異步Controller 任務的處理超時時間
      request-timeout: 1800000
  # i18n 語言,根據瀏覽器傳來的accept-language決定使用哪個語言
  messages:
    basename: messages              # 對應 classpath 下的 messages_*.properties
    encoding: UTF-8
    fallback-to-system-locale: false
  # 配置Json的日期格式
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  # 配置數據源信息
  datasource:
    # 配置數據源類型,使用SpringBoot3 預設的連接持數據源,hikari
    type: com.zaxxer.hikari.HikariDataSource
    # 配置連接數據庫的各個信息
    driver-class-name: org.mariadb.jdbc.Driver
    # 配置URL,mysql8.0剛出時不配置?serverTimezone=Asia/Taipei,會報啟動錯誤
    # 現在好像解決了
    url: jdbc:mariadb://localhost:3306/ticbcs2026_international_conference?rewriteBatchedStatements=true
    # 配置連接用戶
    username: ${DB_USER}
    # 配置用戶密碼
    password: ${DB_PASSWORD}
    #hikari:

  mail:
    # host: smtp.gmail.com
    host: smtp-relay.brevo.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  cloud:
    aws:
      region:
        # MinIO 通常不需要真实的 AWS Region，但需要设置一个占位符
        static: us-east-1
      credentials:
        # MinIO 的 Access Key
        access-key: ${MINIO_ACCESS_KEY}
        # MinIO 的 Secret Key
        secret-key: ${MINIO_SECRET_KEY}
      s3:
        # !!! 关键配置 !!!
        # 指向您的 MinIO 服务地址和 API 端口 (默认通常是 9000)
        endpoint: http://localhost:9000
        bucketName: ${MINIO_BUCKET_NAME}

          # MinIO 强制使用 Path Style 路径，这通常是 S3 兼容服务所需要的
          # 例如：http://ip:port/bucket-name/object-key
          #        force-path-style: true

          # 如果您的 MinIO 是 HTTP 协议，或者您不想用 SSL，建议设置：
          #        custom-http-client-configuration:
          #          protocol: HTTP1_1


mybatis-plus:
  # 說明:mybatis3後使用mapperLocations, XML路徑掃描配置,預設為classpath*:/mapper/**/*.xml
  # 說明:多模塊項目的掃描路徑得以classpath*:開頭
  # mapperLocations: classpath*:/mapper/**/*.xml

  # 說明:typeAliases-package: 設定別名掃描包,通常用於掃描單表的實體類,但因繼承BaseMapper這很少用
  # 以這個範例項目為例,他應該是這個包下,預設所有實體類的類名(不區分大小寫)為別名
  typeAliasesPackage: tw.com.ticbcs.pojo.entity
  # 配置設定
  configuration:
    # 配置輸出日誌-方便查看SQL語句
    #    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 延遲加載的全局開關,當開啟時,所有關聯對象都會延遲加載
    # lazyLoadingEnabled默認為false
    lazyLoadingEnabled: true
    # 當開啟時,任何方法的調用都會加載該對象的所有屬性,否則每個屬性會按須加載
    # mybatis 3.4.1以後默認都是false
    aggressiveLazyLoading: false


